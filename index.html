<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>TruyenForFun — Manga / Manhwa Reader</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="header glass-panel">
        <div class="header-left">
          <div class="logo">
            <img src="logo.jpg" alt="TruyenForFun Logo" class="logo-img" />
            <h1>TruyenForFun</h1>
          </div>
        </div>

        <div class="header-controls">
          <div class="tab-group">
            <button id="mangaTab" class="tab-btn" aria-pressed="false">
              Manga
            </button>
            <button id="manhwaTab" class="tab-btn active" aria-pressed="true">
              Manhwa
            </button>
          </div>

          <div class="control-separator"></div>

          <div class="control-group">
            <select
               id="modalMaxWidthSelect"
               class="select-input"
               title="Manhwa Width"
            >
              <option value="30" selected>30% Width</option>
              <option value="40">40% Width</option>
              <option value="50">50% Width</option>
              <option value="60">60% Width</option>
              <option value="70">70% Width</option>
              <option value="80">80% Width</option>
              <option value="90">90% Width</option>
              <option value="100">100% Width</option>
            </select>

            <select id="thumbSize" class="select-input" title="Thumbnail Size">
              <option value="small">Small</option>
              <option value="medium" selected>Medium</option>
              <option value="large">Large</option>
            </select>
          </div>

          <div class="control-group">
            <label
              class="action-btn primary"
              for="chooseFolder"
              id="chooseLabel"
            >
              <span class="icon">📂</span> Open Folder
            </label>
            <input
              id="chooseFolder"
              type="file"
              webkitdirectory
              directory
              multiple
              style="display: none"
            />
            <button id="clearBtn" class="action-btn danger" title="Clear All">
              <span class="icon">🗑️</span>
            </button>
          </div>

          <div class="control-separator"></div>

          <button
            id="themeToggleBtn"
            class="action-btn"
            title="Toggle Theme"
            aria-label="Toggle Theme"
          >
            <span class="icon">☀️</span>
          </button>
        </div>
      </header>

      <div class="main-body-container" id="mainBody">
        <div class="sidebar-trigger" title="Open Sidebar">
          <div class="sidebar-handle-icon">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M13 17l5-5-5-5" />
              <path d="M6 17l5-5-5-5" />
            </svg>
          </div>
        </div>
        <div id="sidebar" class="sidebar glass-panel">
          <div class="sidebar-header">
            <h3>Explorer</h3>
            <div class="sidebar-actions" style="display: flex; gap: 8px; align-items: center;">
               <button
                 id="sidebarReload"
                 class="sidebar-action-btn"
                 title="Reload Folder"
                 aria-label="Reload Folder"
               >
                 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                   <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                   <path d="M3 3v5h5"/>
                 </svg>
               </button>
               <button
                 id="sidebarSort"
                 class="sidebar-action-btn"
                 title="A-Z string sort — click for natural (by number) sort"
                 aria-label="Toggle sort mode"
               >🔤</button>
               <button
                 id="sidebarPin"
                 class="sidebar-pin-btn"
                 title="Pin Sidebar"
                 aria-label="Pin Sidebar"
               >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M12 17v5" />
                  <path
                    d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"
                  />
                </svg>
              </button>
            </div>
          </div>
          <div class="sidebar-content custom-scrollbar">
            <!-- Tree folder renders here -->
          </div>
          <div class="sidebar-resizer" id="sidebarResizer"></div>
        </div>

        <main class="main-content">
          <section id="galleryContainer" class="gallery-container">
            <div id="gallery" class="gallery layout-medium" aria-live="polite">
              <!-- Empty State -->
              <div class="empty-state" id="emptyState">
                <div class="drop-zone" id="dropZone">
                  <div class="drop-zone-content">
                    <div class="empty-icon">📂</div>
                    <h2>Drop Folder Here</h2>
                    <p>Drag and drop a folder to view your images</p>
                    <div class="drop-zone-divider">
                      <span>or</span>
                    </div>
                    <button class="drop-zone-btn" id="browseFolderBtn">
                      <span class="icon">📂</span> Browse Folder
                    </button>
                  </div>
                  <div class="drop-zone-overlay">
                    <div class="drop-zone-overlay-content">
                      <div class="drop-icon">📥</div>
                      <p>Drop folder to open</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div id="sentinel" class="sentinel"></div>
          </section>
        </main>

        <!-- Modal for Manga -->
        <div id="modal" class="modal" aria-hidden="true">
          <div class="modal-backdrop"></div>
          <div class="modal-content" id="modalContent">
            <button
              class="nav-btn prev-btn"
              id="prevBtn"
              aria-label="Previous Image"
            >
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M15 18l-6-6 6-6" />
              </svg>
            </button>

            <div class="image-wrapper">
              <img id="modalImage" class="modal-image lazyload" alt="Preview" />
            </div>

            <button
              class="nav-btn next-btn"
              id="nextBtn"
              aria-label="Next Image"
            >
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M9 18l6-6-6-6" />
              </svg>
            </button>

            <div class="zoom-controls glass-panel" id="zoomControls">
              <button
                id="zoomInBtn"
                class="zoom-btn"
                aria-label="Zoom In"
                title="Zoom In (+)"
              >
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
              </button>
              <button
                id="zoomOutBtn"
                class="zoom-btn"
                aria-label="Zoom Out"
                title="Zoom Out (-)"
              >
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
              </button>
              <button
                 id="resetZoomBtn"
                 class="zoom-btn"
                 aria-label="Reset Zoom"
                 title="Reset to fit (R)"
              >
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                  <path d="M3 3v5h5" />
                </svg>
              </button>
              </div>

             <!-- Live zoom percentage indicator -->
             <div id="zoomIndicator" class="zoom-indicator" aria-hidden="true">100%</div>

            <button
              id="closeModalBtn"
              class="close-modal-btn"
              aria-label="Close Modal"
            >
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>

        <!-- Scroll buttons -->
        <div class="scroll-buttons">
          <button id="scrollTopBtn" class="scroll-btn" title="Scroll to Top">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 15l-6-6-6 6" />
            </svg>
          </button>
          <button
            id="scrollBottomBtn"
            class="scroll-btn"
            title="Scroll to Bottom"
          >
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M6 9l6 6 6-6" />
            </svg>
          </button>
        </div>

        <footer class="footer glass-panel">
          <div class="footer-content">
            <p>
              &copy; <span id="copyrightYear">2025</span>
              <strong>TruyenForFun</strong>. All rights reserved.
            </p>
          </div>
        </footer>
      </div>
    </div>

    <div id="contextMenu" class="context-menu" style="display: none">
      <div class="context-item" id="ctxOpen">
        <span class="icon">📂</span>
        <span>Open Folder</span>
      </div>
      <div class="context-item" id="ctxSetRoot">
        <span class="icon">🏠</span>
        <span>Set as Root</span>
      </div>
    </div>

    <script src="lazysizes.min.js" async=""></script>
    <script src="script.js"></script>
  </body>
</html>
